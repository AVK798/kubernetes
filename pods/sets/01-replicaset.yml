apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: replicas
  labels:
    app: frontend
spec:
  replicas: 2
  selectors:
   matchLables:
     app: frontend
   template:
    metadata:
      labels:
        app: frontend
    spec:
     containers:
      - name: nginx
        image: nginx
      
