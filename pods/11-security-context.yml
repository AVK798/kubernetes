apiVersion: v1
kind: Pod
metadata:
  name: security
spec:
  containers:
    - name: secuirty-context
      image: debug
      imagePullPolicy: Always
      securityContext:
        #runAsUser: 1000
        runAsNonRoot: true
---
apiVersion: v1
kind: Pod
metadata:
  name: privileged
spec:
  containers:
    - name: docker
      image: docker
      securityContext:
        runAsNonRoot: false
      command:
      - sleep
      - "1000000"

