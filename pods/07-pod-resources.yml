apiVersion: v1 
kind: Pod 
metadata: 
  name: resources 
spec:
  containers:
    - name: centos
      image: centos:7
      command: ["sleep", "1000"]
      resources:
        requests:
          cpu: "100m"
          memory: "64Mi"
        limits:
          cpu: "125m"
          memory: "128Mi"
