apiVersion: v1
kind: Pod
metadata: 
  name: sampleenv
spec:
 containers:
  - name: centos
    image: centos:7
    command:
      - sleep 
      - "1000"
    # env: 
    #   - name: username
    #     value: "EMP2456"
    envFrom:
      - configMapRef:
        name: raw-data
    env:
      - name: URl
        valueFrom: 
         configMapKeyRef:
              key: URl
              name: raw-data
              
        


---

apiVersion: v1
kind: ConfigMap
metadata:
 name: raw-data
data:
 URl: google.com
 cmd: ping