---

apiVersion: v1
kind: Pod
metadata:
  name: lifecycle-demo
spec:
  containers:
  - name: nginx
    image: nginx
    lifecycle:
      postStart:
        exec:
          command: ["sh","-c","echo Container started"]
      preStop:
        exec:
          command: ["sh","-c","sleep 10"]